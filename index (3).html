<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Prompt Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #ffffff;
      --bg2:      #f7f6f3;
      --bg3:      #f0efe9;
      --text:     #1a1a18;
      --text2:    #5a5a56;
      --text3:    #9a9890;
      --border:   rgba(0,0,0,0.10);
      --border2:  rgba(0,0,0,0.18);
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --font:     'Inter', system-ui, sans-serif;
      --mono:     'JetBrains Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:     #1c1c1a;
        --bg2:    #242422;
        --bg3:    #2c2c28;
        --text:   #e8e6de;
        --text2:  #a0a099;
        --text3:  #686860;
        --border: rgba(255,255,255,0.09);
        --border2:rgba(255,255,255,0.16);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg3);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.6;
    }
    .page { max-width: 780px; margin: 0 auto; }

    .header { margin-bottom: 2rem; }
    .header-eyebrow {
      font-size: 11px; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text3); margin-bottom: 6px;
    }
    .header h1 { font-size: 22px; font-weight: 600; }
    .header p  { font-size: 14px; color: var(--text2); margin-top: 4px; }

    .card {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: var(--radius-xl); padding: 1.5rem; margin-bottom: 1rem;
    }
    .section-label {
      font-size: 11px; font-weight: 500; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text3); margin-bottom: 8px;
    }

    .prompt-row { display: flex; gap: 8px; align-items: flex-start; }
    textarea {
      flex: 1; font-family: var(--mono); font-size: 13px;
      min-height: 90px; padding: 10px 12px;
      border: 0.5px solid var(--border2); border-radius: var(--radius-md);
      background: var(--bg2); color: var(--text);
      resize: vertical; transition: border-color .15s;
    }
    textarea:focus { outline: none; border-color: #378ADD; }
    .analyze-btn {
      padding: 10px 20px; font-size: 13px; font-family: var(--font);
      font-weight: 500; border-radius: var(--radius-md);
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      background: var(--text); color: var(--bg); border: none;
      transition: opacity .15s;
    }
    .analyze-btn:hover   { opacity: .85; }
    .analyze-btn:disabled { opacity: .4; cursor: not-allowed; }
    .hint { font-size: 11px; color: var(--text3); margin-top: 6px; }

    .loading-card {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 2rem;
      text-align: center; color: var(--text2); font-size: 14px;
      margin-bottom: 1rem;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border2);
      border-top-color: var(--text2);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-card {
      background: #FCEBEB; border: 0.5px solid #F7C1C1;
      border-radius: var(--radius-lg); padding: 12px 16px;
      font-size: 13px; color: #A32D2D; margin-bottom: 1rem;
    }

    .pipeline { display: flex; flex-direction: column; gap: 2px; }
    .stage {
      border: 0.5px solid var(--border); border-radius: var(--radius-lg);
      overflow: hidden; background: var(--bg); transition: border-color .2s;
    }
    .stage.open { border-color: var(--border2); }
    .stage-header {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; cursor: pointer; user-select: none;
    }
    .stage-header:hover { background: var(--bg2); }
    .stage-icon {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .stage-title  { font-size: 13px; font-weight: 500; flex: 1; }
    .stage-badge  { font-size: 11px; padding: 2px 9px; border-radius: 12px; flex-shrink: 0; }
    .stage-chevron { font-size: 10px; color: var(--text3); transition: transform .2s; }
    .stage.open .stage-chevron { transform: rotate(180deg); }
    .stage-body {
      display: none; padding: 0 14px 14px;
      border-top: 0.5px solid var(--border);
    }
    .stage.open .stage-body { display: block; }

    .s-scan    .stage-icon { background: #E6F1FB; color: #185FA5; }
    .s-tag     .stage-icon { background: #EEEDFE; color: #534AB7; }
    .s-intent  .stage-icon { background: #FAEEDA; color: #854F0B; }
    .s-policy  .stage-icon { background: #FCEBEB; color: #A32D2D; }
    .s-respond .stage-icon { background: #EAF3DE; color: #3B6D11; }
    .badge-blue   { background: #E6F1FB; color: #185FA5; }
    .badge-purple { background: #EEEDFE; color: #534AB7; }
    .badge-amber  { background: #FAEEDA; color: #854F0B; }
    .badge-red    { background: #FCEBEB; color: #A32D2D; }
    .badge-green  { background: #EAF3DE; color: #3B6D11; }

    .token-strip { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; font-family: var(--mono); font-size: 12px; }
    .token { padding: 3px 8px; border-radius: 4px; border: 0.5px solid transparent; position: relative; cursor: default; }
    .token:hover .token-tooltip { display: block; }
    .token-tooltip {
      display: none; position: absolute; bottom: 110%; left: 50%;
      transform: translateX(-50%); background: var(--bg);
      border: 0.5px solid var(--border2); border-radius: 8px;
      padding: 7px 11px; font-size: 11px; white-space: nowrap;
      z-index: 10; color: var(--text); font-family: var(--font);
      min-width: 160px; line-height: 1.5;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    }
    .tok-neutral { background: var(--bg2); border-color: var(--border);  color: var(--text2); }
    .tok-crisis  { background: #FCEBEB;   border-color: #F7C1C1;         color: #A32D2D; }
    .tok-ambig   { background: #FAEEDA;   border-color: #FAC775;         color: #854F0B; }
    .tok-context { background: #EEEDFE;   border-color: #CECBF6;         color: #534AB7; }

    .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
    .legend-swatch { width: 10px; height: 10px; border-radius: 2px; }

    .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .tag { display: flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .tag-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .tag-crisis   { background: #FCEBEB; color: #A32D2D; } .tag-crisis .tag-dot   { background: #E24B4A; }
    .tag-selfharm { background: #FAECE7; color: #993C1D; } .tag-selfharm .tag-dot { background: #D85A30; }
    .tag-ambig    { background: #FAEEDA; color: #854F0B; } .tag-ambig .tag-dot    { background: #BA7517; }
    .tag-context  { background: #EEEDFE; color: #534AB7; } .tag-context .tag-dot  { background: #7F77DD; }
    .tag-safe     { background: #EAF3DE; color: #3B6D11; } .tag-safe .tag-dot     { background: #639922; }
    .tag-info     { background: #E6F1FB; color: #185FA5; } .tag-info .tag-dot     { background: #378ADD; }
    .tag-details  { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
    .tag-detail   { font-size: 12px; color: var(--text2); line-height: 1.5; }
    .tag-detail strong { color: var(--text); font-weight: 500; }

    .intent-tree  { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .intent-row   { display: flex; align-items: center; gap: 10px; }
    .intent-label { font-size: 12px; color: var(--text2); width: 200px; flex-shrink: 0; }
    .intent-bar-wrap { flex: 1; background: var(--bg2); border-radius: 4px; height: 8px; overflow: hidden; }
    .intent-bar   { height: 100%; border-radius: 4px; width: 0%; transition: width .6s ease; }
    .intent-pct   { font-size: 12px; font-weight: 500; width: 36px; text-align: right; }

    .policy-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .policy-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 12px; border-radius: var(--radius-md); background: var(--bg2); }
    .policy-item.pass-yes     { background: #EAF3DE; }
    .policy-item.pass-no      { background: #FCEBEB; }
    .policy-item.pass-neutral { background: #FAEEDA; }
    .policy-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .policy-text-title { font-size: 13px; font-weight: 500; }
    .policy-text-desc  { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.5; }

    .response-card { margin-top: 10px; border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .response-type-bar { padding: 8px 14px; font-size: 12px; font-weight: 500; }
    .rt-crisis  { background: #FCEBEB; color: #A32D2D; }
    .rt-comply  { background: #EAF3DE; color: #3B6D11; }
    .rt-clarify { background: #FAEEDA; color: #854F0B; }
    .rt-decline { background: #FAECE7; color: #993C1D; }
    .response-body { padding: 14px; font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-wrap; background: var(--bg); }

    .verdict { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-radius: var(--radius-md); margin-top: 1rem; font-size: 13px; font-weight: 500; }
    .verdict-crisis  { background: #FCEBEB; color: #A32D2D; border: 0.5px solid #F7C1C1; }
    .verdict-safe    { background: #EAF3DE; color: #3B6D11; border: 0.5px solid #C0DD97; }
    .verdict-clarify { background: #FAEEDA; color: #854F0B; border: 0.5px solid #FAC775; }
    .verdict-decline { background: #FAECE7; color: #993C1D; border: 0.5px solid #F5C4B3; }
    .verdict-icon { font-size: 18px; }

    .divider { height: 0.5px; background: var(--border); margin: 10px 0; }
    .note { font-size: 12px; color: var(--text3); margin-top: 8px; line-height: 1.5; }
    .mt8 { margin-top: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-eyebrow">Red-team explainer</div>
    <h1>Claude Prompt Analyzer</h1>
    <p>See how Claude reads, tags, and decides how to respond — live, for any prompt.</p>
  </div>

  <div id="error-area"></div>

  <div class="card">
    <div class="section-label">Enter a prompt</div>
    <div class="prompt-row">
      <textarea id="prompt-input" placeholder="Type any prompt here…"></textarea>
      <button class="analyze-btn" id="analyze-btn" onclick="analyze()">Analyze →</button>
    </div>
    <div class="hint">Ctrl+Enter / Cmd+Enter to analyze</div>
  </div>

  <div id="loading-area"></div>
  <div id="pipeline" class="pipeline hidden"></div>
  <div id="verdict-area"></div>

</div>
<script>
function showError(msg) {
  document.getElementById("error-area").innerHTML =
    `<div class="error-card">&#9888; ${msg}</div>`;
}
function clearError() {
  document.getElementById("error-area").innerHTML = "";
}

async function analyze() {
  const prompt = document.getElementById("prompt-input").value.trim();
  if (!prompt) return;

  clearError();
  setLoading(true);

  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt }),
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.error || `Server error ${res.status}`);
      setLoading(false);
      return;
    }

    setLoading(false);
    renderPipeline(data);
  } catch (err) {
    setLoading(false);
    showError("Network error: " + err.message);
  }
}

function setLoading(on) {
  const btn = document.getElementById("analyze-btn");
  const area = document.getElementById("loading-area");
  const pipeline = document.getElementById("pipeline");
  const verdictArea = document.getElementById("verdict-area");

  btn.disabled = on;
  btn.textContent = on ? "Analyzing…" : "Analyze →";

  if (on) {
    area.innerHTML = `<div class="loading-card"><div class="spinner"></div>Reading tokens, classifying signals, evaluating intent…</div>`;
    pipeline.classList.add("hidden");
    verdictArea.innerHTML = "";
  } else {
    area.innerHTML = "";
  }
}

function renderPipeline(data) {
  const pipeline = document.getElementById("pipeline");
  const verdictArea = document.getElementById("verdict-area");

  pipeline.classList.remove("hidden");
  pipeline.innerHTML = [
    buildStage("s-scan",    "1", "Token scan",          `${(data.tokens||[]).length} tokens`,  buildTokens(data),  "badge-blue"),
    buildStage("s-tag",     "2", "Signal tagging",       `${(data.tags||[]).length} tags`,      buildTags(data),    "badge-purple"),
    buildStage("s-intent",  "3", "Intent distribution",  "",                                    buildIntents(data), "badge-amber"),
    buildStage("s-policy",  "4", "Policy checks",        `${(data.policies||[]).length} rules`, buildPolicies(data),"badge-red"),
    buildStage("s-respond", "5", "Response strategy",    data.responseTypeLabel || "",           buildResponse(data),"badge-green"),
  ].join("");

  verdictArea.innerHTML = buildVerdict(data);
  pipeline.querySelector(".stage")?.classList.add("open");

  setTimeout(() => {
    pipeline.querySelectorAll(".intent-bar").forEach(b => {
      b.style.width = b.dataset.pct + "%";
    });
  }, 60);
}

function buildStage(sClass, num, title, badge, body, badgeCls) {
  return `<div class="stage ${sClass}">
    <div class="stage-header" onclick="this.closest('.stage').classList.toggle('open')">
      <div class="stage-icon">${num}</div>
      <div class="stage-title">${title}</div>
      ${badge ? `<span class="stage-badge ${badgeCls}">${badge}</span>` : ""}
      <span class="stage-chevron">&#9660;</span>
    </div>
    <div class="stage-body">${body}</div>
  </div>`;
}

function buildTokens(data) {
  const tokens = data.tokens || [];
  const strip = tokens.map(t =>
    `<span class="token ${t.cls||'tok-neutral'}">${esc(t.text)}<span class="token-tooltip">${esc(t.note)}</span></span>`
  ).join("");
  return `<div class="mt8">
    <div class="token-strip">${strip}</div>
    <div class="legend">
      <span class="legend-item"><span class="legend-swatch" style="background:#FCEBEB;border:0.5px solid #F7C1C1"></span>Crisis signal</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#FAEEDA;border:0.5px solid #FAC775"></span>Ambiguous</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#EEEDFE;border:0.5px solid #CECBF6"></span>Context</span>
      <span class="legend-item"><span class="legend-swatch" style="background:var(--bg2);border:0.5px solid var(--border)"></span>Neutral</span>
    </div>
    <div class="note">Hover each token to see how it's read.</div>
  </div>`;
}

function buildTags(data) {
  const tags = data.tags || [];
  const pills = tags.map(t =>
    `<div class="tag ${t.cls||'tag-info'}"><div class="tag-dot"></div>${esc(t.label)}</div>`
  ).join("");
  const details = tags.map(t =>
    `<div class="tag-detail"><strong>${esc(t.label)}:</strong> ${esc(t.reason)}</div>`
  ).join("");
  return `<div class="mt8">
    <div class="tag-grid">${pills}</div>
    <div class="divider"></div>
    <div class="tag-details">${details}</div>
  </div>`;
}

function buildIntents(data) {
  const intents = data.intents || [];
  const rows = intents.map(i => `
    <div class="intent-row">
      <div class="intent-label">${esc(i.label)}</div>
      <div class="intent-bar-wrap"><div class="intent-bar" data-pct="${i.pct}" style="background:${i.color}"></div></div>
      <div class="intent-pct" style="color:${i.color}">${i.pct}%</div>
    </div>`).join("");
  return `<div class="intent-tree mt8">${rows}
    <div class="note">Probability distribution over plausible interpretations of the prompt.</div>
  </div>`;
}

function buildPolicies(data) {
  const policies = data.policies || [];
  const items = policies.map(p => {
    const cls = p.pass === true ? "pass-yes" : p.pass === false ? "pass-no" : "pass-neutral";
    return `<div class="policy-item ${cls}">
      <div class="policy-icon">${p.icon}</div>
      <div>
        <div class="policy-text-title">${esc(p.title)}</div>
        <div class="policy-text-desc">${esc(p.desc)}</div>
      </div>
    </div>`;
  }).join("");
  return `<div class="policy-list mt8">${items}</div>`;
}

function buildResponse(data) {
  const rtCls = {crisis:"rt-crisis",comply:"rt-comply",clarify:"rt-clarify",decline:"rt-decline"}[data.responseType]||"rt-comply";
  return `<div class="response-card mt8">
    <div class="response-type-bar ${rtCls}">${esc(data.responseTypeLabel)}</div>
    <div class="response-body">${esc(data.response)}</div>
  </div>`;
}

function buildVerdict(data) {
  const icons = {crisis:"&#128680;",safe:"&#9989;",clarify:"&#9888;",decline:"&#128683;"};
  const cls   = {crisis:"verdict-crisis",safe:"verdict-safe",clarify:"verdict-clarify",decline:"verdict-decline"}[data.verdict]||"verdict-safe";
  return `<div class="verdict ${cls}">
    <span class="verdict-icon">${icons[data.verdict]||"&#8505;"}</span>
    <span>${esc(data.verdictText)}</span>
  </div>`;
}

function esc(str) {
  return String(str||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

document.getElementById("prompt-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) analyze();
});
</script>
</body>
</html>
